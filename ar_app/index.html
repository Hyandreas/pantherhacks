<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; media-src 'self' blob:; img-src 'self' data:; connect-src 'self' http://127.0.0.1:8788 ws://127.0.0.1:8788;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumen Webcam Widget</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="webcam-shell">
      <div class="drag-region" aria-hidden="true"></div>
      <button
        id="closeButton"
        class="close-button"
        type="button"
        aria-label="Close"
      >
        x
      </button>
      <button
        id="translateButton"
        class="translate-button"
        type="button"
        aria-expanded="false"
      >
        Translate
      </button>
      <aside id="translatePanel" class="translate-panel" hidden>
        <button
          id="translatePanelClose"
          class="translate-panel-close"
          type="button"
          aria-label="Close translate settings"
        >
          x
        </button>
        <p class="translate-kicker">Translate</p>
        <div class="translate-row">
          <span>Spoken</span>
          <div class="language-picker" data-language-picker="spoken">
            <button
              id="spokenLanguageButton"
              class="language-picker-button"
              type="button"
              aria-expanded="false"
            >
              English
            </button>
            <div
              id="spokenLanguageList"
              class="language-picker-list"
              hidden
            ></div>
          </div>
        </div>
        <div class="translate-row">
          <span>Captioned</span>
          <div class="language-picker" data-language-picker="caption">
            <button
              id="captionLanguageButton"
              class="language-picker-button"
              type="button"
              aria-expanded="false"
            >
              English
            </button>
            <div
              id="captionLanguageList"
              class="language-picker-list"
              hidden
            ></div>
          </div>
        </div>
      </aside>
      <video id="cameraFeed" autoplay muted playsinline></video>
      <section
        id="captionOverlay"
        class="caption-overlay"
        aria-live="polite"
        hidden
      >
        <div class="caption-status">
          <span class="live-dot"></span>
          <span id="captionStatus">Live captions</span>
        </div>
        <p id="captionText">Speak near the microphone.</p>
        <button id="whoIsThisButton" class="who-button" type="button" hidden>
          Who's this?
        </button>
        <div id="confidenceBar" class="confidence-bar" aria-hidden="true">
          <span></span>
        </div>
      </section>
      <section id="speakerPrompt" class="speaker-prompt" hidden>
        <button
          id="speakerPromptButton"
          class="speaker-prompt-button"
          type="button"
        >
          <span>New voice detected</span>
          <strong id="speakerPromptName">Rename speaker</strong>
        </button>
        <form id="speakerPromptForm" class="speaker-prompt-form" hidden>
          <label for="speakerNameInput">Speaker name</label>
          <div>
            <input
              id="speakerNameInput"
              type="text"
              maxlength="32"
              autocomplete="off"
              placeholder="Mom, Doctor, Teammate"
            />
            <button type="submit">Save</button>
          </div>
          <button id="speakerLaterButton" class="speaker-later" type="button">
            Later
          </button>
        </form>
      </section>
      <aside
        id="speakerInfoPanel"
        class="speaker-info-panel"
        aria-live="polite"
        hidden
      >
        <button
          id="speakerInfoClose"
          class="speaker-info-close"
          type="button"
          aria-label="Close speaker info"
        >
          x
        </button>
        <p class="speaker-info-kicker">Speaker profile</p>
        <h2 id="speakerInfoName">Unknown speaker</h2>
        <dl>
          <div>
            <dt>Relation</dt>
            <dd id="speakerInfoRelation">Not set</dd>
          </div>
          <div>
            <dt>Description</dt>
            <dd id="speakerInfoDescription">No description yet.</dd>
          </div>
        </dl>
        <form id="speakerInfoForm" class="speaker-info-form">
          <label id="speakerProfilePickerLabel">Assign existing</label>
          <div
            id="speakerProfilePicker"
            class="speaker-profile-picker"
            aria-labelledby="speakerProfilePickerLabel"
          >
            <button
              id="speakerProfilePickerButton"
              class="speaker-profile-picker-button"
              type="button"
              aria-expanded="false"
            >
              Create new profile
            </button>
            <div
              id="speakerProfilePickerList"
              class="speaker-profile-picker-list"
              hidden
            ></div>
          </div>
          <label for="speakerInfoNameInput">Name</label>
          <input
            id="speakerInfoNameInput"
            type="text"
            maxlength="32"
            autocomplete="off"
            placeholder="Mom, Doctor, Teammate"
          />
          <label for="speakerInfoRelationInput">Relation</label>
          <input
            id="speakerInfoRelationInput"
            type="text"
            maxlength="48"
            autocomplete="off"
            placeholder="Friend, doctor, teammate"
          />
          <label for="speakerInfoDescriptionInput">Description</label>
          <textarea
            id="speakerInfoDescriptionInput"
            maxlength="240"
            rows="3"
            placeholder="Short note to help recognize this person"
          ></textarea>
          <button type="submit">Save profile</button>
        </form>
      </aside>
      <div id="handStatus" class="hand-status" aria-live="polite">
        Hand tracking: starting
      </div>
      <div id="handCursor" class="hand-cursor" hidden aria-hidden="true"></div>
      <div id="cameraError" class="camera-error" hidden>
        Camera unavailable. Check permissions and restart the widget.
      </div>
    </main>

    <script src="./node_modules/@mediapipe/hands/hands.js"></script>
    <script src="./node_modules/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
